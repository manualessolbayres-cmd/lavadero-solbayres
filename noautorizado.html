<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>Sin acceso — Lavadero Solbayres</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <!-- Apple -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <!-- Android / PWA -->
  <link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1e242d;--border:#2a3140;--text:#e6edf3;--muted:#6e7f96;--gold:#E8A020;--danger:#f85149;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
.wrap{width:100%;max-width:400px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:24px;}
.icon-wrap{width:80px;height:80px;border-radius:50%;background:rgba(248,81,73,.1);border:2px solid rgba(248,81,73,.3);display:flex;align-items:center;justify-content:center;font-size:36px;}
.titulo{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--danger);}
.desc{font-size:15px;color:var(--muted);line-height:1.6;max-width:320px;}
.desc strong{color:var(--text);}
.btn-volver{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:13px 28px;border-radius:10px;background:var(--gold);color:#0d1117;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s;}
.btn-volver:hover{background:#c8861a;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.logo span{color:var(--gold);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Lavadero <span>///</span> Solbayres</div>

  <div class="icon-wrap">🔒</div>

  <div>
    <div class="titulo">Acceso no autorizado</div>
  </div>

  <div class="desc">
    No tenés permisos para acceder a este módulo.<br><br>
    Si creés que es un error, contactá a un <strong>administrador del sistema</strong>.
  </div>

  <a class="btn-volver" href="index.html">← Volver al inicio</a>
</div>

<script>
// Mostrar nombre del módulo bloqueado si viene por parámetro
const params  = new URLSearchParams(window.location.search);
const modulo  = params.get('modulo');
if (modulo) {
  document.querySelector('.desc').innerHTML =
    'No tenés permisos para acceder a <strong>' + modulo + '</strong>.<br><br>' +
    'Si creés que es un error, contactá a un <strong>administrador del sistema</strong>.';
}
</script>
</body>
</html>
